<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mdict Server - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="adminApp()" x-init="init()">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-2xl font-bold text-gray-900">📚 Mdict Server</a>
                <span class="text-sm text-gray-500">管理后台</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-600" x-text="user?.username || 'Admin'"></span>
                <button @click="showChangePassword = true" class="text-sm text-blue-600 hover:text-blue-800">修改密码</button>
                <a href="/" class="text-sm text-blue-600 hover:text-blue-800">返回查询</a>
                <button @click="logout()" class="text-sm text-gray-600 hover:text-gray-800">登出</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Loading -->
        <div x-show="loading" x-cloak class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-2 text-gray-600">加载中...</p>
        </div>

        <!-- Login Required -->
        <div x-show="!loading && !user" x-cloak class="text-center py-12">
            <p class="text-gray-600 mb-4">请先登录管理后台</p>
            <button @click="showLogin = true" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                登录
            </button>
        </div>

        <!-- Admin Content -->
        <div x-show="!loading && user" x-cloak>
            <!-- Dictionary Management -->
            <section class="bg-white rounded-lg shadow-sm p-6 mb-6">
                <h2 class="text-xl font-bold text-gray-900 mb-4">📖 词典管理</h2>

                <!-- Upload Area -->
                <div
                    x-show="!uploading"
                    class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center mb-6 hover:border-blue-400 transition-colors"
                    @dragover.prevent="dragover = true"
                    @dragleave.prevent="dragover = false"
                    @drop.prevent="handleDrop($event)"
                    :class="{ 'border-blue-400 bg-blue-50': dragover }"
                >
                    <div class="text-gray-600">
                        <p class="text-lg mb-2">拖拽词典/资源文件到此处</p>
                        <p class="text-sm">支持 .mdx .mdd .css .jpg 等文件，可多选</p>
                        <div class="mt-2 flex items-center justify-center gap-3">
                            <label class="inline-block px-4 py-2 bg-blue-600 text-white rounded-lg cursor-pointer hover:bg-blue-700">
                                选择文件
                                <input type="file" class="hidden" accept=".mdx,.mdd,.css,.js,.jpg,.jpeg,.png,.gif,.svg,.webp,.mp3,.wav,.ogg,.woff,.woff2,.ttf,.eot,.ico,.pdf" multiple @change="handleFileSelect($event)">
                            </label>
                            <label class="inline-block px-4 py-2 bg-green-600 text-white rounded-lg cursor-pointer hover:bg-green-700">
                                选择文件夹
                                <input type="file" class="hidden" webkitdirectory @change="handleFolderSelect($event)">
                            </label>
                        </div>
                    </div>
                </div>
                <div x-show="uploading" x-cloak class="border-2 border-blue-200 bg-blue-50 rounded-lg p-6 mb-6">
                    <p class="text-sm font-medium text-gray-700 mb-2" x-text="uploadFileName"></p>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div class="bg-blue-600 h-2.5 rounded-full transition-all" :style="`width: ${uploadProgress}%`"></div>
                    </div>
                    <p class="text-sm text-gray-500 mt-2" x-text="uploadStatusText"></p>
                </div>

                <!-- Dictionary List -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">状态</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">文件名</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">标题</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">大小</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">词条数</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <template x-for="dict in dicts" :key="dict.id">
                                <tr>
                                    <td class="px-4 py-3">
                                        <button
                                            @click="toggleDictStatus(dict)"
                                            class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
                                            :class="dict.is_enabled ? 'bg-blue-600' : 'bg-gray-200'"
                                        >
                                            <span
                                                class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
                                                :class="dict.is_enabled ? 'translate-x-6' : 'translate-x-1'"
                                            ></span>
                                        </button>
                                    </td>
                                    <td class="px-4 py-3 text-sm text-gray-900" x-text="dict.filename"></td>
                                    <td class="px-4 py-3 text-sm text-gray-600">
                                        <div class="flex items-center space-x-1">
                                            <template x-if="editingDictId !== dict.id">
                                                <div class="flex items-center space-x-1">
                                                    <span class="text-gray-600" x-text="dict.title || '-'"></span>
                                                    <button
                                                        @click="startEditTitle(dict)"
                                                        class="text-gray-400 hover:text-blue-600 flex-shrink-0"
                                                        title="修改标题"
                                                    >
                                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                                    </button>
                                                </div>
                                            </template>
                                            <template x-if="editingDictId === dict.id">
                                                <div class="flex items-center space-x-1">
                                                    <input
                                                        type="text"
                                                        x-model="editingTitle"
                                                        @keydown.enter="saveTitle(dict)"
                                                        @keydown.escape="cancelEditTitle()"
                                                        class="w-full px-2 py-1 border border-blue-400 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-transparent"
                                                        x-ref="titleInput"
                                                    >
                                                    <button @click="saveTitle(dict)" class="text-green-600 hover:text-green-800 flex-shrink-0" title="保存">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                                    </button>
                                                    <button @click="cancelEditTitle()" class="text-gray-400 hover:text-red-600 flex-shrink-0" title="取消">
                                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                    </button>
                                                </div>
                                            </template>
                                        </div>
                                    </td>
                                    <td class="px-4 py-3 text-sm text-gray-600" x-text="formatSize(dict.file_size)"></td>
                                    <td class="px-4 py-3 text-sm text-gray-600" x-text="dict.entry_count.toLocaleString()"></td>
                                    <td class="px-4 py-3">
                                        <button
                                            @click="deleteDict(dict)"
                                            class="text-red-600 hover:text-red-800 text-sm"
                                        >
                                            删除
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- User Management -->
            <section class="bg-white rounded-lg shadow-sm p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-gray-900">👥 用户管理</h2>
                    <button
                        x-show="isAdmin"
                        @click="showCreateUser = true"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                    >
                        + 新建用户
                    </button>
                </div>

                <!-- User List -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">用户名</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">权限</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">API Token</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <template x-for="u in users" :key="u.id">
                                <tr>
                                    <td class="px-4 py-3 text-sm text-gray-900" x-text="u.username"></td>
                                    <td class="px-4 py-3">
                                        <div class="flex flex-wrap gap-2">
                                            <span x-show="u.permissions.can_use_api" class="px-2 py-1 text-xs bg-green-100 text-green-800 rounded">API</span>
                                            <span x-show="u.permissions.is_dict_admin" class="px-2 py-1 text-xs bg-blue-100 text-blue-800 rounded">词典管理</span>
                                            <span x-show="u.permissions.is_user_admin" class="px-2 py-1 text-xs bg-purple-100 text-purple-800 rounded">用户管理</span>
                                        </div>
                                    </td>
                                    <td class="px-4 py-3">
                                        <div class="flex items-center space-x-2">
                                            <code class="text-xs text-gray-600 bg-gray-100 px-2 py-1 rounded" x-text="u.api_token ? u.api_token.substring(0, 20) + '...' : '-'"></code>
                                            <button
                                                @click="copyToken(u.api_token)"
                                                class="text-blue-600 hover:text-blue-800 text-xs"
                                                x-show="u.api_token"
                                            >
                                                复制
                                            </button>
                                        </div>
                                    </td>
                                    <td class="px-4 py-3">
                                    <div class="flex space-x-2">
                                        <button
                                            @click="openResetPassword(u)"
                                            class="text-blue-600 hover:text-blue-800 text-sm"
                                        >
                                            修改密码
                                        </button>
                                        <template x-if="isAdmin && u.id !== user?.id">
                                            <div class="flex space-x-2">
                                                <button
                                                    @click="resetToken(u)"
                                                    class="text-blue-600 hover:text-blue-800 text-sm"
                                                >
                                                    重置Token
                                                </button>
                                                <button
                                                    @click="deleteUser(u)"
                                                    class="text-red-600 hover:text-red-800 text-sm"
                                                    x-show="!u.permissions.is_user_admin"
                                                >
                                                    删除
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Create User Modal -->
    <div x-show="showCreateUser" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">新建用户</h2>
            <form @submit.prevent="createUser()">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input
                        type="text"
                        x-model="newUser.username"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                    >
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码（留空自动生成）</label>
                    <input
                        type="password"
                        x-model="newUser.password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">权限</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" x-model="newUser.can_use_api" class="rounded text-blue-600">
                            <span class="ml-2 text-sm text-gray-700">允许 API 访问</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" x-model="newUser.is_dict_admin" class="rounded text-blue-600">
                            <span class="ml-2 text-sm text-gray-700">词典管理员</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" x-model="newUser.is_user_admin" class="rounded text-blue-600">
                            <span class="ml-2 text-sm text-gray-700">用户管理员</span>
                        </label>
                    </div>
                </div>
                <div x-show="createUserError" class="mb-4 text-red-600 text-sm" x-text="createUserError"></div>
                <div class="flex justify-end space-x-4">
                    <button
                        type="button"
                        @click="showCreateUser = false"
                        class="px-4 py-2 text-gray-600 hover:text-gray-800"
                    >
                        取消
                    </button>
                    <button
                        type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                    >
                        创建
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div x-show="showLogin" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">登录</h2>
            <form @submit.prevent="login()">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input
                        type="text"
                        x-model="loginForm.username"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                    >
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input
                        type="password"
                        x-model="loginForm.password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                    >
                </div>
                <div x-show="loginError" class="mb-4 text-red-600 text-sm" x-text="loginError"></div>
                <div class="flex justify-end space-x-4">
                    <button
                        type="button"
                        @click="showLogin = false"
                        class="px-4 py-2 text-gray-600 hover:text-gray-800"
                    >
                        取消
                    </button>
                    <button
                        type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                    >
                        登录
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Created User Modal -->
    <div x-show="showCreatedUser" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-4">用户创建成功</h2>
            <div class="mb-4">
                <p class="text-sm text-gray-600 mb-2">用户名：</p>
                <code class="block bg-gray-100 p-2 rounded" x-text="createdUser?.username"></code>
            </div>
            <div class="mb-4" x-show="createdUser?.password">
                <p class="text-sm text-gray-600 mb-2">密码（请妥善保存）：</p>
                <code class="block bg-gray-100 p-2 rounded" x-text="createdUser?.password"></code>
            </div>
            <div class="mb-6">
                <p class="text-sm text-gray-600 mb-2">API Token：</p>
                <div class="flex items-center space-x-2">
                    <code class="block bg-gray-100 p-2 rounded flex-1 break-all" x-text="createdUser?.api_token"></code>
                    <button @click="copyToken(createdUser?.api_token)" class="px-3 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 whitespace-nowrap">
                        复制
                    </button>
                </div>
            </div>
            <div class="flex justify-end">
                <button
                    @click="showCreatedUser = false"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                >
                    确定
                </button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal (own password) -->
    <div x-show="showChangePassword" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">修改密码</h2>
            <form @submit.prevent="changePassword()">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">当前密码</label>
                    <input
                        type="password"
                        x-model="changePasswordForm.old_password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                    >
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">新密码</label>
                    <input
                        type="password"
                        x-model="changePasswordForm.new_password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                        minlength="6"
                    >
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">确认新密码</label>
                    <input
                        type="password"
                        x-model="changePasswordForm.confirm_password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                    >
                </div>
                <div x-show="changePasswordError" class="mb-4 text-red-600 text-sm" x-text="changePasswordError"></div>
                <div class="flex justify-end space-x-4">
                    <button type="button" @click="showChangePassword = false" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">确认修改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Admin Reset Password Modal (requires operator's current password) -->
    <div x-show="showAdminResetPassword" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">修改用户密码</h2>
            <p class="text-sm text-gray-600 mb-4">正在修改用户 <strong x-text="adminResetUser?.username"></strong> 的密码</p>
            <form @submit.prevent="adminResetPassword()">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">您的当前密码</label>
                    <input
                        type="password"
                        x-model="adminResetForm.old_password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                        placeholder="输入您自己的当前密码以验证身份"
                    >
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">新密码</label>
                    <input
                        type="password"
                        x-model="adminResetForm.new_password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                        minlength="6"
                    >
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">确认新密码</label>
                    <input
                        type="password"
                        x-model="adminResetForm.confirm_password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        required
                    >
                </div>
                <div x-show="adminResetError" class="mb-4 text-red-600 text-sm" x-text="adminResetError"></div>
                <div class="flex justify-end space-x-4">
                    <button type="button" @click="showAdminResetPassword = false" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">确认修改</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function adminApp() {
            const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB per chunk
            const LARGE_FILE_THRESHOLD = 10 * 1024 * 1024; // 10MB: use chunked upload above this
            const MAX_CHUNK_RETRIES = 3;

            return {
                user: null,
                token: null,
                isAdmin: false,
                dicts: [],
                users: [],
                loading: true,
                showLogin: false,
                showCreateUser: false,
                showCreatedUser: false,
                createdUser: null,
                loginForm: { username: '', password: '' },
                loginError: null,
                newUser: {
                    username: '',
                    password: '',
                    can_use_api: true,
                    is_dict_admin: false,
                    is_user_admin: false
                },
                createUserError: null,
                uploading: false,
                uploadProgress: 0,
                dragover: false,
                uploadFileName: '',
                uploadStatusText: '',
                showChangePassword: false,
                changePasswordForm: { old_password: '', new_password: '', confirm_password: '' },
                changePasswordError: null,
                showAdminResetPassword: false,
                adminResetUser: null,
                adminResetForm: { old_password: '', new_password: '', confirm_password: '' },
                adminResetError: null,
                editingDictId: null,
                editingTitle: '',

                async init() {
                    this.token = localStorage.getItem('token');
                    if (this.token) {
                        try {
                            const userStr = localStorage.getItem('user');
                            if (userStr) {
                                this.user = JSON.parse(userStr);
                                this.isAdmin = this.user?.permissions?.is_user_admin || false;
                            }
                        } catch (e) {
                            this.token = null;
                        }
                    }

                    this.loading = false;

                    if (this.user) {
                        await this.loadData();
                    }
                },

                async loadData() {
                    await Promise.all([
                        this.loadDicts(),
                        this.loadUsers()
                    ]);
                },

                async loadDicts() {
                    try {
                        const response = await this.fetchWithAuth('/api/v1/dicts');
                        if (response.code === 0) {
                            this.dicts = response.data || [];
                        }
                    } catch (e) {
                        console.error('Failed to load dictionaries:', e);
                    }
                },

                async loadUsers() {
                    try {
                        // Admin can see all users
                        const response = await this.fetchWithAuth('/api/v1/users');
                        if (response.code === 0) {
                            this.users = response.data || [];
                            return;
                        }
                        // If forbidden (non-admin), fall back to own info
                        const meResponse = await this.fetchWithAuth('/api/v1/users/me');
                        if (meResponse.code === 0) {
                            this.users = meResponse.data || [];
                        }
                    } catch (e) {
                        // Try /me as fallback
                        try {
                            const meResponse = await this.fetchWithAuth('/api/v1/users/me');
                            if (meResponse.code === 0) {
                                this.users = meResponse.data || [];
                            }
                        } catch (e2) {
                            console.error('Failed to load users:', e2);
                        }
                    }
                },

                async toggleDictStatus(dict) {
                    try {
                        const response = await this.fetchWithAuth(`/api/v1/dicts/${dict.id}/status`, {
                            method: 'PATCH',
                            body: JSON.stringify({ is_enabled: !dict.is_enabled })
                        });

                        if (response.code === 0) {
                            dict.is_enabled = !dict.is_enabled;
                        }
                    } catch (e) {
                        console.error('Failed to toggle dict status:', e);
                    }
                },

                async deleteDict(dict) {
                    if (!confirm(`确定要删除词典 "${dict.filename}" 吗？`)) return;

                    try {
                        const response = await this.fetchWithAuth(`/api/v1/dicts/${dict.id}`, {
                            method: 'DELETE'
                        });

                        if (response.code === 0) {
                            this.dicts = this.dicts.filter(d => d.id !== dict.id);
                        }
                    } catch (e) {
                        console.error('Failed to delete dict:', e);
                    }
                },

                handleDrop(event) {
                    this.dragover = false;
                    const files = event.dataTransfer.files;
                    if (files.length > 0) {
                        this.uploadFiles(files);
                    }
                },

                handleFileSelect(event) {
                    const files = event.target.files;
                    if (files.length > 0) {
                        this.uploadFiles(files);
                    }
                    event.target.value = '';
                },

                handleFolderSelect(event) {
                    const files = event.target.files;
                    if (files.length > 0) {
                        this.uploadFiles(files, true);
                    }
                    event.target.value = '';
                },

                async uploadFiles(fileList, isFolder = false) {
                    const files = Array.from(fileList);
                    const allowedExts = ['mdx','mdd','css','js','jpg','jpeg','png','gif','svg','webp','mp3','wav','ogg','woff','woff2','ttf','eot','ico','pdf'];
                    const valid = files.filter(f => allowedExts.includes(f.name.split('.').pop().toLowerCase()));
                    if (valid.length === 0) {
                        alert('没有可上传的文件（不支持的文件类型）');
                        return;
                    }

                    // Build relativePathMap: file -> relative path (for folder uploads)
                    const relativePathMap = new Map();
                    if (isFolder) {
                        for (const f of valid) {
                            if (f.webkitRelativePath) {
                                relativePathMap.set(f, f.webkitRelativePath);
                            }
                        }
                    }

                    // Separate large files (chunked) from small files (batch)
                    const largeFiles = valid.filter(f => f.size >= LARGE_FILE_THRESHOLD);
                    const smallFiles = valid.filter(f => f.size < LARGE_FILE_THRESHOLD);

                    // Upload small files in one batch request
                    if (smallFiles.length > 0) {
                        await this.batchUpload(smallFiles, relativePathMap);
                    }

                    // Upload large files one by one with chunking
                    for (const file of largeFiles) {
                        await this.chunkedUpload(file, relativePathMap.get(file) || '');
                    }
                },

                async batchUpload(files, relativePathMap = new Map()) {
                    this.uploading = true;
                    this.uploadProgress = 0;
                    this.uploadFileName = files.length === 1 ? files[0].name : `${files.length} 个文件`;
                    this.uploadStatusText = `上传中 (0/${files.length})...`;

                    const formData = new FormData();
                    for (const f of files) {
                        formData.append('files', f);
                        formData.append('relative_path', relativePathMap.get(f) || '');
                    }

                    try {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', '/api/v1/dicts/upload');
                        xhr.setRequestHeader('Authorization', `Bearer ${this.token}`);
                        xhr.timeout = 0;

                        xhr.upload.onprogress = (e) => {
                            if (e.lengthComputable) {
                                this.uploadProgress = (e.loaded / e.total) * 100;
                                this.uploadStatusText = `${this.formatSize(e.loaded)} / ${this.formatSize(e.total)}`;
                            }
                        };

                        const result = await new Promise((resolve, reject) => {
                            xhr.onload = () => {
                                if (xhr.status === 200) {
                                    resolve(JSON.parse(xhr.responseText));
                                } else {
                                    reject(new Error('Upload failed'));
                                }
                            };
                            xhr.onerror = () => reject(new Error('Network error'));
                            xhr.send(formData);
                        });

                        if (result.code === 0) {
                            await this.loadDicts();
                            if (result.data && result.data.some) {
                                const failed = result.data.filter(r => r.error);
                                if (failed.length > 0) {
                                    const msgs = failed.map(r => `${r.filename}: ${r.error}`).join('\n');
                                    alert(`部分文件上传失败:\n${msgs}`);
                                }
                            }
                        } else {
                            alert(result.message || '上传失败');
                        }
                    } catch (e) {
                        alert('上传失败: ' + e.message);
                    } finally {
                        this.uploading = false;
                        this.uploadProgress = 0;
                        this.uploadFileName = '';
                        this.uploadStatusText = '';
                    }
                },

                async chunkedUpload(file, relativePath = '') {
                    this.uploading = true;
                    this.uploadProgress = 0;
                    this.uploadFileName = file.name;
                    const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
                    this.uploadStatusText = `准备分片上传 (${totalChunks} 片)...`;

                    try {
                        // Init
                        const initBody = {
                            filename: file.name,
                            file_size: file.size,
                            chunk_size: CHUNK_SIZE
                        };
                        if (relativePath) {
                            initBody.relative_path = relativePath;
                        }
                        const initResp = await this.fetchWithAuth('/api/v1/dicts/upload/init', {
                            method: 'POST',
                            body: JSON.stringify(initBody)
                        });

                        if (initResp.code !== 0) {
                            throw new Error(initResp.message || '初始化上传失败');
                        }

                        const uploadId = initResp.data.upload_id;
                        const totalParts = initResp.data.total_parts;

                        // Upload chunks with retry
                        for (let i = 0; i < totalParts; i++) {
                            const start = i * CHUNK_SIZE;
                            const end = Math.min(start + CHUNK_SIZE, file.size);
                            const chunk = file.slice(start, end);

                            let success = false;
                            let lastError = null;

                            for (let attempt = 1; attempt <= MAX_CHUNK_RETRIES; attempt++) {
                                try {
                                    const formData = new FormData();
                                    formData.append('upload_id', uploadId);
                                    formData.append('chunk_index', i.toString());
                                    formData.append('chunk', chunk, `${file.name}.part${i}`);

                                    const chunkResp = await new Promise((resolve, reject) => {
                                        const xhr = new XMLHttpRequest();
                                        xhr.open('PUT', '/api/v1/dicts/upload/chunk');
                                        xhr.setRequestHeader('Authorization', `Bearer ${this.token}`);
                                        xhr.timeout = 300000; // 5 min per chunk

                                        xhr.onload = () => {
                                            if (xhr.status === 200) {
                                                resolve(JSON.parse(xhr.responseText));
                                            } else {
                                                reject(new Error(`HTTP ${xhr.status}`));
                                            }
                                        };
                                        xhr.onerror = () => reject(new Error('Network error'));
                                        xhr.ontimeout = () => reject(new Error('Timeout'));
                                        xhr.send(formData);
                                    });

                                    if (chunkResp.code === 0) {
                                        success = true;
                                        break;
                                    } else {
                                        lastError = new Error(chunkResp.message);
                                    }
                                } catch (e) {
                                    lastError = e;
                                    if (attempt < MAX_CHUNK_RETRIES) {
                                        // Exponential backoff: 1s, 2s
                                        await new Promise(r => setTimeout(r, 1000 * attempt));
                                    }
                                }
                            }

                            if (!success) {
                                throw new Error(`分片 ${i + 1}/${totalParts} 上传失败: ${lastError?.message || '未知错误'}`);
                            }

                            this.uploadProgress = ((i + 1) / totalParts) * 100;
                            this.uploadStatusText = `分片 ${i + 1}/${totalParts} 完成 (${this.formatSize(end)} / ${this.formatSize(file.size)})`;
                        }

                        // Complete
                        this.uploadStatusText = '正在合并文件...';
                        const completeResp = await this.fetchWithAuth('/api/v1/dicts/upload/complete', {
                            method: 'POST',
                            body: JSON.stringify({ upload_id: uploadId })
                        });

                        if (completeResp.code !== 0) {
                            throw new Error(completeResp.message || '合并文件失败');
                        }

                        await this.loadDicts();
                    } catch (e) {
                        alert('上传失败: ' + e.message);
                    } finally {
                        this.uploading = false;
                        this.uploadProgress = 0;
                        this.uploadFileName = '';
                        this.uploadStatusText = '';
                    }
                },

                async createUser() {
                    this.createUserError = null;

                    try {
                        const response = await this.fetchWithAuth('/api/v1/users', {
                            method: 'POST',
                            body: JSON.stringify({
                                username: this.newUser.username,
                                password: this.newUser.password || undefined,
                                permissions: {
                                    can_use_api: this.newUser.can_use_api,
                                    is_dict_admin: this.newUser.is_dict_admin,
                                    is_user_admin: this.newUser.is_user_admin
                                }
                            })
                        });

                        if (response.code === 0) {
                            this.createdUser = response.data;
                            this.showCreateUser = false;
                            this.showCreatedUser = true;
                            this.newUser = {
                                username: '',
                                password: '',
                                can_use_api: true,
                                is_dict_admin: false,
                                is_user_admin: false
                            };
                            await this.loadUsers();
                        } else {
                            this.createUserError = response.message || '创建失败';
                        }
                    } catch (e) {
                        this.createUserError = '网络错误，请重试';
                    }
                },

                async deleteUser(user) {
                    if (!confirm(`确定要删除用户 "${user.username}" 吗？`)) return;

                    try {
                        const response = await this.fetchWithAuth(`/api/v1/users/${user.id}`, {
                            method: 'DELETE'
                        });

                        if (response.code === 0) {
                            this.users = this.users.filter(u => u.id !== user.id);
                        } else {
                            alert(response.message || '删除失败');
                        }
                    } catch (e) {
                        console.error('Failed to delete user:', e);
                    }
                },

                async resetToken(user) {
                    if (!confirm(`确定要重置用户 "${user.username}" 的 API Token 吗？`)) return;

                    try {
                        const response = await this.fetchWithAuth(`/api/v1/users/${user.id}/reset-token`, {
                            method: 'POST'
                        });

                        if (response.code === 0) {
                            user.api_token = response.data.api_token;
                            alert('Token 已重置，请复制保存');
                        } else {
                            alert(response.message || '重置失败');
                        }
                    } catch (e) {
                        console.error('Failed to reset token:', e);
                    }
                },

                openResetPassword(user) {
                    this.adminResetUser = user;
                    this.adminResetForm = { old_password: '', new_password: '', confirm_password: '' };
                    this.adminResetError = null;
                    this.showAdminResetPassword = true;
                },

                async adminResetPassword() {
                    this.adminResetError = null;

                    if (this.adminResetForm.new_password !== this.adminResetForm.confirm_password) {
                        this.adminResetError = '两次输入的密码不一致';
                        return;
                    }

                    if (this.adminResetForm.new_password.length < 6) {
                        this.adminResetError = '新密码至少6位';
                        return;
                    }

                    try {
                        const response = await this.fetchWithAuth(`/api/v1/users/${this.adminResetUser.id}/password`, {
                            method: 'PUT',
                            body: JSON.stringify({
                                old_password: this.adminResetForm.old_password,
                                new_password: this.adminResetForm.new_password
                            })
                        });

                        if (response.code === 0) {
                            this.showAdminResetPassword = false;
                            alert('密码已修改');
                        } else {
                            this.adminResetError = response.message || '修改失败';
                        }
                    } catch (e) {
                        this.adminResetError = '网络错误，请重试';
                    }
                },

                async changePassword() {
                    this.changePasswordError = null;

                    if (this.changePasswordForm.new_password !== this.changePasswordForm.confirm_password) {
                        this.changePasswordError = '两次输入的密码不一致';
                        return;
                    }

                    if (this.changePasswordForm.new_password.length < 6) {
                        this.changePasswordError = '新密码至少6位';
                        return;
                    }

                    try {
                        const response = await this.fetchWithAuth('/api/v1/users/me/password', {
                            method: 'PUT',
                            body: JSON.stringify({
                                old_password: this.changePasswordForm.old_password,
                                new_password: this.changePasswordForm.new_password
                            })
                        });

                        if (response.code === 0) {
                            this.showChangePassword = false;
                            this.changePasswordForm = { old_password: '', new_password: '', confirm_password: '' };
                            alert('密码修改成功');
                        } else {
                            this.changePasswordError = response.message || '修改失败';
                        }
                    } catch (e) {
                        this.changePasswordError = '网络错误，请重试';
                    }
                },

                startEditTitle(dict) {
                    this.editingDictId = dict.id;
                    this.editingTitle = dict.title || '';
                    this.$nextTick(() => {
                        const input = this.$el.querySelector('input[x-ref="titleInput"]');
                        if (input) { input.focus(); input.select(); }
                    });
                },

                cancelEditTitle() {
                    this.editingDictId = null;
                    this.editingTitle = '';
                },

                async saveTitle(dict) {
                    if (this.editingDictId !== dict.id) return;
                    const newTitle = this.editingTitle.trim();
                    if (!newTitle) {
                        this.cancelEditTitle();
                        return;
                    }
                    if (newTitle === dict.title) {
                        this.cancelEditTitle();
                        return;
                    }

                    try {
                        const response = await this.fetchWithAuth(`/api/v1/dicts/${dict.id}/title`, {
                            method: 'PUT',
                            body: JSON.stringify({ title: newTitle })
                        });

                        if (response.code === 0) {
                            dict.title = newTitle;
                        }
                    } catch (e) {
                        console.error('Failed to update title:', e);
                    }
                    this.cancelEditTitle();
                },

                copyToken(token) {
                    if (!token) return;
                    navigator.clipboard.writeText(token).then(() => {
                        alert('Token 已复制到剪贴板');
                    }).catch(() => {
                        const textarea = document.createElement('textarea');
                        textarea.value = token;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        alert('Token 已复制到剪贴板');
                    });
                },

                formatSize(bytes) {
                    if (bytes === 0) return '0 B';
                    const k = 1024;
                    const sizes = ['B', 'KB', 'MB', 'GB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
                },

                async login() {
                    this.loginError = null;

                    try {
                        const response = await fetch('/api/v1/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm)
                        });

                        const data = await response.json();

                        if (data.code === 0) {
                            this.token = data.data.access_token;
                            this.user = data.data.user;
                            this.isAdmin = this.user?.permissions?.is_user_admin || false;

                            localStorage.setItem('token', this.token);
                            localStorage.setItem('refresh_token', data.data.refresh_token);
                            localStorage.setItem('user', JSON.stringify(this.user));

                            this.showLogin = false;
                            this.loginForm = { username: '', password: '' };

                            await this.loadData();
                        } else {
                            this.loginError = data.message || '登录失败';
                        }
                    } catch (e) {
                        this.loginError = '网络错误，请重试';
                    }
                },

                logout() {
                    this.token = null;
                    this.user = null;
                    this.isAdmin = false;
                    localStorage.removeItem('token');
                    localStorage.removeItem('refresh_token');
                    localStorage.removeItem('user');
                    this.dicts = [];
                    this.users = [];
                },

                async fetchWithAuth(url, options = {}) {
                    const headers = {
                        'Content-Type': 'application/json',
                        ...options.headers
                    };

                    if (this.token) {
                        headers['Authorization'] = `Bearer ${this.token}`;
                    }

                    const response = await fetch(url, {
                        ...options,
                        headers
                    });

                    if (response.status === 401 && this.token) {
                        this.logout();
                        this.showLogin = true;
                        return { code: 40101, message: 'Session expired' };
                    }

                    return response.json();
                }
            }
        }
    </script>
